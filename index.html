<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RaksMine</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- top-center transparent metrics pill -->
  <div class="hud-pill" id="stats"></div>

  <!-- top-right toolbar -->
  <div id="ui">
    <button id="pagesBtn" class="panel">Pages</button>
    <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <!-- stamina / weight bars -->
  <div id="bars">
    <div class="stat-bar" id="staminaBar">
      <div class="stat-bar__fill" id="staminaFill"></div>
      <span class="stat-bar__label">STA</span>
    </div>
    <div class="stat-bar" id="weightBar">
      <div class="stat-bar__fill" id="weightFill"></div>
      <span class="stat-bar__label">WGT</span>
    </div>
  </div>

  <canvas id="game" width="1280" height="720"></canvas>

  <!-- transient notifications (bottom-right by default) -->
  <div id="toasts"></div>

  <!-- new-player guidance -->
  <div id="interactPrompt" class="interact-prompt hidden"></div>
  <div id="controlsHint" class="controls-hint"></div>

  <!-- Shop modal -->
  <div id="shopModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Surface Shop</h3>
        <button id="shopClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body" id="shopBody"></div>
    </div>
  </div>

  <!-- Inventory modal -->
  <div id="invModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Inventory</h3>
        <button id="invClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body">
        <div class="grid-4" id="invGrid"></div>
        <div id="invTotal"></div>
      </div>
    </div>
  </div>

  <!-- Market modal -->
  <div id="marketModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Market</h3>
        <button id="marketClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body">
        <div class="row-between">
          <div>Total Value: <span id="marketTotal" class="accent">$0</span></div>
          <button id="marketSellAll" class="btn btn-primary">Sell All</button>
        </div>
        <div class="col" id="marketBody"></div>
      </div>
    </div>
  </div>

  <!-- Builder modal -->
  <div id="builderModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Builder</h3>
        <button id="builderClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body" id="builderBody"></div>
    </div>
  </div>

  <!-- Forge modal -->
  <div id="forgeModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Forge</h3>
        <button id="forgeClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body" id="forgeBody"></div>
    </div>
  </div>

  <!-- Warehouse modal -->
  <div id="warehouseModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Warehouse</h3>
        <button id="warehouseClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body">
        <div>
          <h4>Player Inventory</h4>
          <div id="warehousePlayerInv" class="col"></div>
        </div>
        <div>
          <h4>Warehouse Storage</h4>
          <div id="warehouseInv" class="col"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Ascension modal -->
  <div id="ascendModal" class="modal-overlay hidden">
    <div class="modal-card modal-sm">
      <div class="modal-header">
        <h3>Ascension</h3>
        <button id="ascendClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body">
        <p>Reset the world for new opportunities. Cost: $<span id="ascendCostText" class="accent"></span>. If you can't afford it, you may ascend for no gain.</p>
        <button id="ascendBtn" class="btn btn-primary btn-block">Ascend</button>
        <button id="ascShopBtn" class="btn btn-block">Ascension Shop</button>
      </div>
    </div>
  </div>

  <!-- Ascension shop modal -->
  <div id="ascShopModal" class="modal-overlay hidden">
    <div class="modal-card modal-lg">
      <div class="modal-header">
        <h3>Ascension Upgrades</h3>
        <button id="ascShopClose" class="btn btn-sm">Close</button>
      </div>
      <div id="ascShopBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Pages modal -->
  <div id="pagesModal" class="modal-overlay hidden">
    <div class="modal-card modal-lg">
      <div class="modal-header">
        <h3>Pages</h3>
        <button id="pagesClose" class="btn btn-sm">Close</button>
      </div>
      <div id="pagesBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Settings</h3>
        <button id="settingsClose" class="btn btn-sm">Close</button>
      </div>
      <div class="modal-body">
        <div>
          <h4>Save Data</h4>
          <div class="row">
            <button id="saveBtn" class="btn">Save to File</button>
            <button id="loadBtn" class="btn">Load from File</button>
            <input id="loadInput" type="file" accept=".txt" class="hidden" />
          </div>
        </div>
        <div>
          <label for="autosaveRange" class="font-medium">Autosave Interval: <span id="autosaveLabel"></span></label>
          <input id="autosaveRange" type="range" min="10" max="300" step="10">
        </div>
        <div>
          <label for="toastXInput" class="font-medium">Notification Offset (from right)</label>
          <input id="toastXInput" type="number">
        </div>
        <div>
          <label for="toastYInput" class="font-medium">Notification Offset (from bottom)</label>
          <input id="toastYInput" type="number">
        </div>
        <div>
          <h4>Key Bindings</h4>
          <div id="keybindsTable" class="grid-2"></div>
        </div>
        <div>
          <button id="hardResetBtn" class="btn btn-danger btn-block">Hard Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.ts"></script>
</body>
</html>
